function pintarLista(){
  const cont = document.getElementById("lista");
  cont.innerHTML = "";
  juegos.forEach(j => {
    const row = document.createElement("div");
    row.className = "item";
    row.id = "row-" + j.slug;
    row.innerHTML = `<span>${j.titulo}</span><span class="pending" id="estado-${j.slug}">pendiente</span>`;
    cont.appendChild(row);
  });
}

document.getElementById("btnImportar").addEventListener("click", async () => {
  const btn = document.getElementById("btnImportar");
  btn.disabled = true;
  btn.textContent = "Importando...";
  for(const j of juegos){
    const estadoEl = document.getElementById("estado-" + j.slug);
    estadoEl.textContent = "subiendo...";
    try{
      const { slug, ...data } = j;
      await set(ref(db, "paginasJuegos/" + slug), data);
      estadoEl.textContent = "✔ importado";
      estadoEl.className = "ok";
    }catch(err){
      console.error(err);
      estadoEl.textContent = "✕ error";
      estadoEl.className = "err";
    }
  }
  btn.textContent = "Listo";
});
